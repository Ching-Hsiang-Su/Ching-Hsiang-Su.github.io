<!DOCTYPE HTML>
<html lang="zh-Hant">
    <head>
        <title>Blog | ChingHsiang Photography</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="蘇靖翔的攝影網誌與 Medium 文章列表。" />
        <meta name="keywords" content="攝影, 網誌, Blog, Medium, 文章" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,600,700,300i,600i,700i|Raleway:600,800&display=swap" />
        <link rel="stylesheet" href="assets/css/main.css?v=20260624-structure" />
    </head>
    <body class="is-preload">
        <nav class="site-nav" aria-label="主要導覽">
            <a href="index.html">Home 首頁</a>
            <a href="gallery.html">Gallery 作品集</a>
            <a href="profile.html">Profile 個人簡介</a>
            <a href="blog.html" aria-current="page">Blog 網誌</a>
        </nav>

        <main id="wrapper">
            <section id="first" class="page-intro">
                <header>
                    <h1 class="page-title">網誌<br />Blog</h1>
                </header>
                <div class="content">
                    <div id="medium-posts" aria-live="polite">
                        <p>正在載入 Medium 最新文章...</p>
                    </div>
                    <noscript>
                        <p>此頁需要 JavaScript 才能載入 Medium 文章。</p>
                    </noscript>
                </div>
            </section>
        </main>

        <script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/jquery.scrolly.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script src="assets/js/main.js"></script>
        <script>
            (function() {
                var mediumUsername = '@kmes9940211';
                var rssUrl = 'https://medium.com/feed/' + mediumUsername;
                var apiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(rssUrl);
                var postsContainer = document.getElementById('medium-posts');

                function renderMessage(message) {
                    var paragraph = document.createElement('p');
                    paragraph.textContent = message;
                    postsContainer.replaceChildren(paragraph);
                }

                function getFirstImage(item) {
                    if (item.thumbnail) {
                        return item.thumbnail;
                    }

                    var html = item.content || item.description || '';
                    var match = html.match(/<img[^>]+src="([^">]+)"/i);
                    return match ? match[1] : '';
                }

                function getSummary(item) {
                    var tmp = document.createElement('div');
                    tmp.innerHTML = item.description || '';
                    var summary = (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();

                    if (summary.length > 150) {
                        return summary.substring(0, 150) + '...';
                    }

                    return summary || '點擊閱讀完整文章。';
                }

                function createExternalLink(url, className) {
                    var link = document.createElement('a');
                    link.href = url;
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';

                    if (className) {
                        link.className = className;
                    }

                    return link;
                }

                fetch(apiUrl)
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error('Medium request failed');
                        }

                        return response.json();
                    })
                    .then(function(data) {
                        if (data.status !== 'ok' || !data.items || data.items.length === 0) {
                            renderMessage('目前沒有文章，或暫時無法載入。');
                            return;
                        }

                        var fragment = document.createDocumentFragment();

                        data.items.slice(0, 6).forEach(function(item) {
                            var article = document.createElement('article');
                            article.className = 'post-card';

                            var title = document.createElement('h3');
                            var titleLink = createExternalLink(item.link);
                            titleLink.textContent = item.title || '未命名文章';
                            title.appendChild(titleLink);
                            article.appendChild(title);

                            var imageUrl = getFirstImage(item);
                            if (imageUrl) {
                                var imageLink = createExternalLink(item.link, 'image fit');
                                var image = document.createElement('img');
                                image.src = imageUrl;
                                image.alt = item.title || 'Medium 文章首圖';
                                image.loading = 'lazy';
                                image.decoding = 'async';
                                imageLink.appendChild(image);
                                article.appendChild(imageLink);
                            }

                            var summary = document.createElement('p');
                            summary.textContent = getSummary(item);
                            article.appendChild(summary);

                            var actions = document.createElement('ul');
                            actions.className = 'actions';

                            var actionItem = document.createElement('li');
                            var readMore = createExternalLink(item.link, 'button primary');
                            readMore.textContent = '閱讀全文';
                            actionItem.appendChild(readMore);
                            actions.appendChild(actionItem);
                            article.appendChild(actions);

                            fragment.appendChild(article);
                        });

                        postsContainer.replaceChildren(fragment);
                    })
                    .catch(function() {
                        renderMessage('載入文章時發生錯誤，請稍後再試。');
                    });
            })();
        </script>
    </body>
</html>
